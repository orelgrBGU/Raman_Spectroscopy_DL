# ── Training configuration (v3) ───────────────────────────────────────
# v3 changes:
#   - Coefficients: softmax → softplus (independent, no sum-to-1 constraint)
#     Enables true zero for distractors without affecting in-mixture coeffs.
#   - Baseline: polynomial → ReLU enforced non-negative
#   - lambda_r: 1.0 → 50.0 (reconstruction was negligible; now physics-driven)
#   - lambda_l1: 0.01 → 0.1 (stronger sparsity for softplus coefficients)
#
# Usage:
#   python -m src.train --config configs/base.yaml --run_id v3_run01
#   python -m src.train --config configs/base.yaml --run_id v3_run01 --max_epochs 5

# ── Model ─────────────────────────────────────────────────────────────
model:
  d_model: 128
  n_transformer_layers: 1
  n_heads: 4
  dropout: 0.1
  poly_order: 5

# ── Loss ──────────────────────────────────────────────────────────────
loss:
  lambda_c: 1.0
  lambda_r: 50.0
  lambda_sad: 1.0
  lambda_b: 0.5
  lambda_l1: 0.1
  lambda_bneg: 10.0

# ── Data / synthetic generator ────────────────────────────────────────
data:
  holdout_frac: 0.2
  holdout_seed: 0
  batch_size: 64
  num_workers: 0     # 0 = main process (avoids /dev/shm limits in containers)

# ── Optimizer ─────────────────────────────────────────────────────────
optimizer:
  lr: 1.0e-3
  weight_decay: 0.0

# ── Scheduler ─────────────────────────────────────────────────────────
scheduler:
  type: cosine
  T_max_epochs: null  # defaults to max_epochs
  eta_min: 1.0e-5

# ── Training ──────────────────────────────────────────────────────────
training:
  max_epochs: 100
  steps_per_epoch: 500
  val_steps: 100
  grad_clip: 1.0
  amp: true

# ── Checkpointing ────────────────────────────────────────────────────
checkpoint:
  dir: checkpoints
  save_every_n_epochs: 5
  keep_last_n: 3

# ── Logging ───────────────────────────────────────────────────────────
logging:
  print_every_n_steps: 50
  tensorboard: true
  csv: true
