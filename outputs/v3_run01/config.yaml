checkpoint:
  dir: checkpoints
  keep_last_n: 3
  save_every_n_epochs: 5
data:
  batch_size: 64
  holdout_frac: 0.2
  holdout_seed: 0
  num_workers: 0
logging:
  csv: true
  print_every_n_steps: 50
  tensorboard: true
loss:
  lambda_b: 0.5
  lambda_bneg: 10.0
  lambda_c: 1.0
  lambda_l1: 0.1
  lambda_r: 50.0
  lambda_sad: 1.0
model:
  d_model: 128
  dropout: 0.1
  n_heads: 4
  n_transformer_layers: 1
  poly_order: 5
optimizer:
  lr: 0.001
  weight_decay: 0.0
scheduler:
  T_max_epochs: null
  eta_min: 1.0e-05
  type: cosine
training:
  amp: true
  grad_clip: 1.0
  max_epochs: 100
  steps_per_epoch: 500
  val_steps: 100
